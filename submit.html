<!DOCTYPE html>
<html>
<head>
    <title>Submit Task</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        input {
            padding: 10px;
            margin: 8px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <h2>Submit Task</h2>

    <form method="POST">

        <input type="number" name="user_id" placeholder="User ID"><br>
        <input type="text" name="task" placeholder="Task"><br>
        <input type="number" name="points" placeholder="Points"><br>

        <button type="submit">Submit</button>

    </form>

    <br>
    <a href="/">⬅ Back</a>

</body>
</html>
