<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>

    <style>
        body {
            font-family: Arial;
            background-color: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            width: 60%;
            margin: auto;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            font-size: 18px;
        }

        .top {
            background: #facc15;
            color: black;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .btn:hover {
            background: #2563eb;
        }
    </style>
</head>

<body>

    <h1>🏆 Leaderboard</h1>

    <div class="container">

        {% if data %}
            {% for row in data %}
                <div class="card {% if loop.index == 1 %}top{% endif %}">
                    #{{ loop.index }} — {{ row[0] }} — {{ row[1] }} points
                </div>
            {% endfor %}
        {% else %}
            <p>No data yet</p>
        {% endif %}

    </div>

    <br>

    <a href="/register" class="btn">➕ Register</a>
    <a href="/submit" class="btn">📤 Submit Task</a>

</body>
</html>
